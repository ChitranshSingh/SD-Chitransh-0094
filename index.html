<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Restaurant Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            text-align: center;
        }
        /* Simple Hero Section */
        .hero {
            background-color: #333;
            color: white;
            padding: 50px 20px;
        }
        .hero h1 {
            margin: 0;
            font-size: 36px;
        }
        /* Menu Section */
        .menu-section {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .menu-item {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Billing Section */
        .billing-section {
            padding: 20px;
            background-color: #e2e2e2;
        }
        .btn {
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .receipt {
            background: white;
            border: 1px solid black;
            padding: 15px;
            width: 300px;
            margin: 20px auto;
            text-align: left;
            font-family: monospace;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <div class="hero">
        <h1>Welcome to Food Plaza</h1>
        <p>Delicious food served fresh daily!</p>
    </div>

    <!-- Menu Section -->
    <div class="menu-section">
        <h2>Our Menu</h2>
        <div class="menu-item">
            <label><input type="checkbox" class="dish" value="Noodles" data-price="500"> Noodles</label>
            <span>Rs. 500</span>
        </div>
        <div class="menu-item">
            <label><input type="checkbox" class="dish" value="Pizza" data-price="550"> Pizza</label>
            <span>Rs. 550</span>
        </div>
        <div class="menu-item">
            <label><input type="checkbox" class="dish" value="Burger" data-price="650"> Burger</label>
            <span>Rs. 650</span>
        </div>
        <div class="menu-item">
            <label><input type="checkbox" class="dish" value="Briyani" data-price="750"> Briyani</label>
            <span>Rs. 750</span>
        </div>
        <div class="menu-item">
            <label><input type="checkbox" class="dish" value="SoyaChaap" data-price="850"> SoyaChaap</label>
            <span><span>Rs. 850</span>
        </div>
    </div>

    <!-- Billing Section -->
    <div class="billing-section">
        <h2>Billing</h2>
        <button class="btn" onclick="showBill()">Generate Bill</button>
        <div id="billReceipt" class="receipt"></div>
    </div>

    <script>
        function showBill() {
            var checkboxes = document.querySelectorAll('.dish:checked');
            var receipt = document.getElementById('billReceipt');
            
            if (checkboxes.length === 0) {
                receipt.innerHTML = "Please select at least one item!";
                receipt.style.display = "block";
                return;
            }

            var billHtml = "<b>--- BILL ---</b><br><br>";
            var total = 0;

            checkboxes.forEach(function(item) {
                var name = item.value;
                var price = parseInt(item.getAttribute('data-price'));
                billHtml += name + ": Rs. " + price + "<br>";
                total += price;
            });

            billHtml += "<br><b>Total: Rs. " + total + "</b>";
            receipt.innerHTML = billHtml;
            receipt.style.display = "block";
        }
    </script>

</body>
</html>
